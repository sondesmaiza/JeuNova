; ── Memory limits tuned for a 1 GB RAM / 4 GB swap VPS ─────────────────────

; Keep PHP memory footprint small
memory_limit = 64M
post_max_size = 20M
upload_max_filesize = 20M
max_execution_time = 60
max_input_time = 60

; OPcache - pre-compile scripts, reduces CPU & memory per request
[opcache]
opcache.enable = 1
opcache.memory_consumption = 32
opcache.interned_strings_buffer = 4
opcache.max_accelerated_files = 1000
opcache.revalidate_freq = 60
opcache.validate_timestamps = 0
opcache.fast_shutdown = 1

; Session
session.gc_maxlifetime = 1440
session.cookie_httponly = 1
session.use_strict_mode = 1

; Timezone
date.timezone = Africa/Tunis

; Error reporting (safe for production)
display_errors = Off
log_errors = On
error_log = /var/log/apache2/php_error.log
